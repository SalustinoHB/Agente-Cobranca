  .search-box { max-width: 1200px; margin: 0 auto 16px; }

  .cond-tabs { display: flex; gap: 8px; max-width: 1200px; margin: 0 auto 16px; flex-wrap: wrap; }

  .cond-tab:hover { border-color: #4f46e5; color: #4f46e5; }
  .cond-tab.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .cond-tab .count { display: inline-block; background: rgba(255,255,255,0.15); padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px; }

  .container { max-width: 1200px; margin: 0 auto; }
  .residente-card { background: #1a1a1a; border-radius: 8px; margin-bottom: 6px; border: 1px solid #2a2a2a; display: flex; align-items: center; padding: 10px 14px; gap: 10px; }

  .residente-card .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #1e3a8a, #4f46e5); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .residente-card .info { flex: 1; min-width: 0; }
  .residente-card .info h4 { font-size: 13px; color: #fff; margin-bottom: 2px; }
  .residente-card .info .meta { font-size: 11px; color: #888; line-height: 1.4; }

  .badge-email { background: #1e1b4b; color: #818cf8; }
  .footer { max-width: 1200px; margin: 24px auto; text-align: center; color: #555; font-size: 12px; }

var condAtivo = CONDOMINIOS[0].slug;

function render() {
  var busca = document.getElementById('searchInput').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  var cond = CONDOMINIOS.find(function(c) { return c.slug === condAtivo; });
  if (!cond) return;
  
  var lista = cond.residentes;
  if (busca) {
    lista = lista.filter(function(r) {
      return (r.nome || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').indexOf(busca) !== -1 ||
             (r.apto || '').indexOf(busca) !== -1 ||
             (r.fone || '').indexOf(busca) !== -1;
    });
  }
  
  document.getElementById('container').innerHTML = lista.map(function(r) {
    var ini = (r.nome || '?').charAt(0);
    var fone = r.fone || '';
    return '<div class="residente-card"><div class="avatar">' + ini + '</div><div class="info"><h4>' + r.nome + '</h4><div class="meta"><b>Apto:</b> ' + (r.apto || '') + (fone ? ' | <b>Tel:</b> ' + fone : ' | ⚠️ Sem telefone') + (r.email ? ' | 📧 ' + r.email : '') + '</div></div></div>';
  }).join('');
}

// Render tabs
document.getElementById('condTabs').innerHTML = CONDOMINIOS.map(function(c) {
  return '<button class="cond-tab' + (c.slug === condAtivo ? ' active' : '') + '" onclick="switchCond(\'' + c.slug + '\')">🏢 ' + c.nome + ' <span class="count">' + c.residentes.length + '</span></button>';
}).join('');

function switchCond(slug) {
  condAtivo = slug;
  document.querySelectorAll('.cond-tab').forEach(function(t) { t.classList.remove('active'); });
  event.target.classList.add('active');
  render();
}

// Stats

CONDOMINIOS.forEach(function(c) { c.residentes.forEach(function(r) { total++; if (r.fone) wpp++; }); });
document.getElementById('statsRow').innerHTML = '<div class="stat-card"><div class="num">' + CONDOMINIOS.length + '</div><div class="label">Condomínios</div></div><div class="stat-card"><div class="num">' + total + '</div><div class="label">Condôminos</div></div><div class="stat-card green"><div class="num">' + wpp + '</div><div class="label">Com Telefone</div></div><div class="stat-card"><div class="num">' + (total - wpp) + '</div><div class="label">Sem Telefone</div></div>';

render();
