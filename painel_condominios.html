<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Condomínios - Pratika</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    padding: 20px;
  }
  .header {
    max-width: 1000px; margin: 0 auto 20px; padding: 24px 28px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 14px; color: #fff;
  }
  .header h1 { margin: 0 0 6px; font-size: 26px; }
  .header .sub { font-size: 14px; opacity: 0.85; }
  .header .data-ref { font-size: 12px; opacity: 0.6; margin-top: 8px; }
  .stats-row { display: flex; gap: 12px; max-width: 1000px; margin: 0 auto 20px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 130px; background: #1a1a1a; padding: 16px 20px;
    border-radius: 10px; border-left: 4px solid #667eea;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: #667eea; }
  .stat-card .label { font-size: 12px; color: #aaa; margin-top: 4px; }
  .stat-card.red { border-left-color: #ff4444; }
  .stat-card.red .num { color: #ff4444; }
  .stat-card.green { border-left-color: #00d4aa; }
  .stat-card.green .num { color: #00d4aa; }
  .stat-card.yellow { border-left-color: #ffaa00; }
  .stat-card.yellow .num { color: #ffaa00; }
  .search-box { max-width: 1000px; margin: 0 auto 16px; }
  .search-box input {
    width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #333;
    background: #1a1a1a; color: #fff; font-size: 14px;
  }
  .search-box input:focus { outline: none; border-color: #667eea; }
  .container { max-width: 1000px; margin: 0 auto; }
  
  /* Abas de Condomínios */
  .cond-tabs {
    display: flex; gap: 8px; max-width: 1000px; margin: 0 auto 16px;
    flex-wrap: wrap;
  }
  .cond-tab {
    padding: 12px 20px; border-radius: 8px; border: 1px solid #333;
    background: transparent; color: #aaa; cursor: pointer;
    font-size: 14px; font-weight: 600; transition: all 0.2s;
  }
  .cond-tab:hover { border-color: #667eea; color: #667eea; }
  .cond-tab.active { background: #667eea; color: #fff; border-color: #667eea; }
  .cond-tab .count {
    display: inline-block; background: rgba(255,255,255,0.15);
    padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px;
  }
  .cond-tab.active .count { background: rgba(0,0,0,0.2); }
  
  /* Cards de Condômino */
  .residente-card {
    background: #1a1a1a; border-radius: 10px;
    margin-bottom: 10px; overflow: hidden;
    border: 1px solid #2a2a2a;
    display: flex; align-items: center; padding: 14px 18px;
    gap: 14px; transition: all 0.2s;
  }
  .residente-card:hover { border-color: #444; }
  .residente-card .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; flex-shrink: 0;
  }
  .residente-card .info { flex: 1; }
  .residente-card .info h4 { font-size: 15px; color: #fff; margin-bottom: 4px; }
  .residente-card .info .meta { font-size: 12px; color: #888; }
  .residente-card .info .meta b { color: #ccc; }
  .residente-card .badges { display: flex; gap: 6px; flex-shrink: 0; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .badge-wpp { background: #1a4d2e; color: #00d4aa; }
  .badge-nowpp { background: #4d1a1a; color: #ff4444; }
  .badge-pendente { background: #4d3d1a; color: #ffaa00; }
  .badge-pago { background: #1a4d2e; color: #00d4aa; }
  .badge-info { background: #333; color: #aaa; }
  .badge-atraso { background: #4d1a1a; color: #ff4444; }
  .badge-pendente { background: #4d3d1a; color: #ffaa00; }
  .footer-actions { max-width: 1000px; margin: 24px auto; text-align: center; color: #555; font-size: 12px; }
  #toast { position: fixed; bottom: 24px; right: 24px; background: #667eea; color: #fff; padding: 12px 18px; border-radius: 8px; font-weight: 600; box-shadow: 0 6px 24px rgba(0,0,0,0.4); display: none; z-index: 100; }
</style>

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

let condAtivo = Object.keys(COND_DATA)[0];

function render() {
  const todos = Object.values(COND_DATA).flat();
  const total = todos.length;
  const comWpp = todos.filter(r => r.wpp).length;
  const pendentes = todos.filter(r => r.status !== 'pago').length;
  const totalValor = todos.reduce((s,r) => s + (r.valor||0), 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Total Condôminos</div></div>
    <div class="stat-card red"><div class="num">${pendentes}</div><div class="label">Inadimplentes</div></div>
    <div class="stat-card green"><div class="num">${comWpp}</div><div class="label">Com WhatsApp</div></div>
    <div class="stat-card"><div class="num">${total - comWpp}</div><div class="label">Sem WhatsApp</div></div>
    <div class="stat-card yellow"><div class="num">R$ ${totalValor.toLocaleString('pt-BR',{minFractionDigits:2})}</div><div class="label">Valor Total</div></div>
    <div class="stat-card"><div class="num">${Object.keys(COND_DATA).length}</div><div class="label">Condomínios</div></div>
  `;
  document.getElementById('dataRef').textContent = 'Atualizado: ' + new Date().toLocaleString('pt-BR');
  renderCondTabs();
  renderContainer();
}

function renderCondTabs() {
  document.getElementById('condTabs').innerHTML = Object.keys(COND_DATA).map(c => {
    const pends = COND_DATA[c].filter(r => r.status !== 'pago').length;
    const total = COND_DATA[c].length;
    return `<button class="cond-tab${c === condAtivo ? ' active' : ''}" onclick="switchCond('${c}')">
      🏢 ${c} <span class="count">${total}</span>
      ${pends > 0 ? ` <span class="count" style="background:#4d1a1a;color:#ff4444;">${pends}</span>` : ''}
    </button>`;
  }).join('');
}

function switchCond(cond) {
  condAtivo = cond;
  document.querySelectorAll('.cond-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderContainer();
}

function filtrar() {
  renderContainer();
}

function renderContainer() {
  const busca = (document.getElementById('searchInput').value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  
  let html = '';
  const conds = condAtivo ? [condAtivo] : Object.keys(COND_DATA);
  
  for (const cond of conds) {
    let residentes = COND_DATA[cond];
    
    if (busca) {
      residentes = residentes.filter(r =>
        r.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(busca) ||
        r.unidade.toLowerCase().includes(busca) ||
        (r.wpp||'').includes(busca)
      );
    }
    
    if (residentes.length === 0) continue;
    
    html += `<h3 style="color:#667eea;margin:0 0 12px;font-size:16px;">🏢 ${cond} — ${residentes.length} condômino${residentes.length > 1 ? 's' : ''}</h3>`;
    
    residentes.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(r => {
      const inicial = r.nome.charAt(0);
      const temWpp = !!r.wpp;
      const pendente = r.status !== 'pago';
      const dias = r.dias || 0;
      const valor = r.valor || 0;
      
      let badge = '';
      if (!temWpp) badge = '<span class="badge badge-nowpp">📵 Sem WhatsApp</span>';
      else badge = '<span class="badge badge-wpp">📱 WhatsApp</span>';
      
      if (pendente && dias >= 15) badge += ' <span class="badge badge-atraso">⚠️ ' + dias + 'd atraso</span>';
      else if (pendente) badge += ' <span class="badge badge-pendente">⏳ ' + dias + 'd atraso</span>';
      else badge += ' <span class="badge badge-pago">✅ Em dia</span>';
      
      html += `
        <div class="residente-card">
          <div class="avatar">${inicial}</div>
          <div class="info">
            <h4>${r.nome}</h4>
            <div class="meta">
              <b>Unidade:</b> ${r.unidade}
              ${temWpp ? ' &nbsp;|&nbsp; <b>WhatsApp:</b> ' + r.wpp : ' &nbsp;|&nbsp; ⚠️ Telefone não cadastrado'}
              &nbsp;|&nbsp; <b>Valor:</b> R$ ${valor.toFixed(2).replace('.',',')}
              ${pendente ? ' &nbsp;|&nbsp; <b style="color:'+(dias>=15?'#ff4444':'#ffaa00')+'">' + dias + ' dias em atraso</b>' : ''}
            </div>
          </div>
          <div class="badges">${badge}</div>
        </div>
      `;
    });
    
    html += '<div style="margin-bottom:24px;"></div>';
  }
  
  document.getElementById('container').innerHTML = html || '<div style="text-align:center;padding:40px;color:#555;">Nenhum resultado encontrado</div>';
}

render();
</script>
