  .stats-row { display: flex; gap: 12px; max-width: 1100px; margin: 0 auto 20px; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 130px; background: #1a1a1a; padding: 14px 18px; border-radius: 10px; border-left: 4px solid #4f46e5; }
  .stat-card .num { font-size: 24px; font-weight: 700; color: #4f46e5; }
  .stat-card .label { font-size: 12px; color: #aaa; margin-top: 4px; }
  .stat-card.red { border-left-color: #dc2626; }
  .stat-card.red .num { color: #dc2626; }
  .stat-card.green { border-left-color: #16a34a; }
  .stat-card.green .num { color: #16a34a; }
  .search-box { max-width: 1100px; margin: 0 auto 16px; }
  .search-box input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; }
  .search-box input:focus { outline: none; border-color: #4f46e5; }
  .cond-tabs { display: flex; gap: 8px; max-width: 1100px; margin: 0 auto 16px; flex-wrap: wrap; }
  .cond-tab { padding: 12px 20px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #aaa; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
  .cond-tab:hover { border-color: #4f46e5; color: #4f46e5; }
  .cond-tab.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .cond-tab .count { display: inline-block; background: rgba(255,255,255,0.15); padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px; }
  .cond-tab.active .count { background: rgba(0,0,0,0.2); }
  .container { max-width: 1100px; margin: 0 auto; }
  .residente-card { background: #1a1a1a; border-radius: 10px; margin-bottom: 8px; border: 1px solid #2a2a2a; display: flex; align-items: center; padding: 12px 16px; gap: 12px; }
  .residente-card:hover { border-color: #444; }
  .residente-card .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #1e3a8a, #4f46e5); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .residente-card .info { flex: 1; min-width: 0; }
  .residente-card .info h4 { font-size: 14px; color: #fff; margin-bottom: 2px; }
  .residente-card .info .meta { font-size: 11px; color: #888; line-height: 1.4; }
  .residente-card .info .meta b { color: #ccc; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .badge-wpp { background: #14532d; color: #22c55e; }
  .badge-nowpp { background: #450a0a; color: #ef4444; }
  .badge-dia { background: #14532d; color: #22c55e; }
  .badge-atraso { background: #451a0a; color: #f97316; }
  .badge-acordo { background: #45350a; color: #eab308; }
  .badge-juridico { background: #450a0a; color: #ef4444; }
  .filtros { display: flex; gap: 8px; max-width: 1100px; margin: 0 auto 16px; flex-wrap: wrap; }
  .filtro-btn { padding: 7px 14px; border-radius: 6px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; font-size: 12px; font-weight: 600; }
  .filtro-btn:hover { border-color: #4f46e5; color: #4f46e5; }
  .filtro-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .footer { max-width: 1100px; margin: 24px auto; text-align: center; color: #555; font-size: 12px; }
</style>

let condAtivo = CONDOMINIOS[0].slug;

function render() {
  // Stats gerais
  let total = 0, comWpp = 0, inadimplentes = 0;
  CONDOMINIOS.forEach(c => {
    c.residentes.forEach(r => {
      total++;
      if (r.fone) comWpp++;
      if (r.status && r.status !== 'dia') inadimplentes++;
    });
  });
  document.getElementById('dataRef').textContent = 'Atualizado: ' + new Date().toLocaleString('pt-BR') + ' · ' + total + ' condôminos cadastrados';
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Total Condôminos</div></div>
    <div class="stat-card red"><div class="num">${inadimplentes}</div><div class="label">Pendentes</div></div>
    <div class="stat-card green"><div class="num">${comWpp}</div><div class="label">Com WhatsApp</div></div>
    <div class="stat-card"><div class="num">${total - comWpp}</div><div class="label">Sem WhatsApp</div></div>
    <div class="stat-card"><div class="num">${CONDOMINIOS.length}</div><div class="label">Condomínios</div></div>
  `;
  
  // Abas
  document.getElementById('condTabs').innerHTML = CONDOMINIOS.map(c => `
    <button class="cond-tab${c.slug === condAtivo ? ' active' : ''}" onclick="switchCond('${c.slug}')">
      🏢 ${c.nome} <span class="count">${c.residentes.length}</span>
    </button>
  `).join('');
  
  atualizar();
}

function switchCond(slug) {
  condAtivo = slug;
  document.querySelectorAll('.cond-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  atualizar();
}

function atualizar() {
  const busca = (document.getElementById('searchInput').value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const cond = CONDOMINIOS.find(c => c.slug === condAtivo);
  if (!cond) return;
  
  let lista = [...cond.residentes];
  if (busca) {
    lista = lista.filter(r => 
      r.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(busca) ||
      r.apt.includes(busca) ||
      (r.fone||'').includes(busca) ||
      (r.email||'').toLowerCase().includes(busca)
    );
  }
  
  document.getElementById('container').innerHTML = lista.map(r => {
    const ini = r.nome.charAt(0);
    let badge = '';
    if (r.status === 'inadimplente') badge = '<span class="badge badge-atraso">🔴 Inadimplente</span>';
    else if (r.status === 'acordo') badge = '<span class="badge badge-acordo">🟡 Acordo</span>';
    else if (r.status === 'cronico') badge = '<span class="badge badge-atraso">🔴 Crônico</span>';
    else if (r.status === 'juridico') badge = '<span class="badge badge-juridico">⚖️ Jurídico</span>';
    else badge = '<span class="badge badge-dia">✅ Em dia</span>';
    
    return `
      <div class="residente-card">
        <div class="avatar">${ini}</div>
        <div class="info">
          <h4>${r.nome} ${badge}</h4>
          <div class="meta">
            <b>Apto:</b> ${r.apt}
            ${r.fone ? ' &nbsp;|&nbsp; 📞 ' + r.fone : ' &nbsp;|&nbsp; ⚠️ Sem telefone'}
            ${r.email ? ' &nbsp;|&nbsp; 📧 ' + r.email : ''}
            ${r.obs ? ' &nbsp;|&nbsp; 📌 ' + r.obs : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

render();
