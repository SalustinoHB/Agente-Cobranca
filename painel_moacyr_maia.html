let filtroAtivo = 'todos';

function setF(f, el) {
  filtroAtivo = f;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const busca = (document.getElementById('searchInput').value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  
  let lista = [...COND_DATA];
  
  if (filtroAtivo === 'inadimplente') lista = lista.filter(r => ['inadimplente','acordo','cronico','juridico'].includes(r.status));
  else if (filtroAtivo === 'dia') lista = lista.filter(r => r.status === 'dia');
  else if (filtroAtivo === 'wpp') lista = lista.filter(r => r.tags.includes('wpp'));
  else if (filtroAtivo === 'nowpp') lista = lista.filter(r => !r.tags.includes('wpp') && r.status === 'dia');
  
  if (busca) {
    lista = lista.filter(r => 
      r.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(busca) ||
      r.apt.includes(busca) ||
      (r.fone||'').includes(busca) ||
      (r.email||'').toLowerCase().includes(busca)
    );
  }
  
  // Stats
  const total = lista.length;
  const comWpp = lista.filter(r => r.tags.includes('wpp')).length;
  document.getElementById('dataRef').textContent = 'Atualizado: ' + new Date().toLocaleString('pt-BR') + ' · ' + total + ' exibidos';
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Exibidos</div></div>
    <div class="stat-card green"><div class="num">${lista.filter(r=>r.status==='dia').length}</div><div class="label">Em dia</div></div>
    <div class="stat-card red"><div class="num">${lista.filter(r=>['inadimplente','acordo','cronico','juridico'].includes(r.status)).length}</div><div class="label">Pendentes</div></div>
    <div class="stat-card"><div class="num">${comWpp}</div><div class="label">Com WhatsApp</div></div>
  `;
  
  // Cards
  document.getElementById('container').innerHTML = lista.map(r => {
    const ini = r.nome.charAt(0);
    let badgeStatus = '';
    if (r.status === 'inadimplente') badgeStatus = '<span class="badge badge-inadimplente">🔴 Inadimplente</span>';
    else if (r.status === 'acordo') badgeStatus = '<span class="badge badge-acordo">🟡 Em acordo</span>';
    else if (r.status === 'cronico') badgeStatus = '<span class="badge badge-cronico">🔴 Crônico</span>';
    else if (r.status === 'juridico') badgeStatus = '<span class="badge badge-juridico">⚖️ Jurídico</span>';
    else badgeStatus = '<span class="badge badge-dia">✅ Em dia</span>';
    
    let tagsExtra = r.tags.filter(t => !['wpp','sp','rs','pe','ddd','pj','semfone','sememail','cronico','incompleto'].includes(t) && !t.startsWith('obs') && !t.startsWith('adv'));
    let obsText = r.tags.filter(t => t.startsWith('obs:') || t.startsWith('adv'));
    
    const temObs = obsText.length > 0;
    
    return `
      <div class="residente-card">
        <div class="avatar">${ini}</div>
        <div class="info">
          <h4>${r.nome} ${badgeStatus}</h4>
          <div class="meta">
            <b>Apto:</b> ${r.apt} &nbsp;|&nbsp; <b>CPF:</b> ${r.cpf}
            ${r.fone !== '—' ? '&nbsp;|&nbsp; 📞 ' + r.fone : '&nbsp;|&nbsp; ⚠️ Sem telefone'}
            ${r.email !== '—' ? '<br>📧 ' + r.email : ''}
            ${temObs ? '<br>📌 ' + obsText.join(' · ') : ''}
          </div>
        </div>
        <div class="badges">
          ${r.tags.includes('wpp') ? '<span class="badge badge-wpp">📱 WhatsApp</span>' : (r.status === 'dia' ? '<span class="badge badge-nowpp">📵 Sem WPP</span>' : '')}
          ${r.tags.includes('sp') ? '<span class="badge badge-sp">📍 SP</span>' : ''}
          ${r.tags.includes('rs') ? '<span class="badge badge-rs">📍 RS</span>' : ''}
          ${r.tags.includes('pe') ? '<span class="badge badge-pe">📍 PE</span>' : ''}
          ${r.tags.includes('pj') ? '<span class="badge badge-pj">🏢 PJ</span>' : ''}
          ${r.tags.includes('ddd') ? '<span class="badge badge-ddd">⚠️ DDD ausente</span>' : ''}
          ${r.tags.includes('semfone') ? '<span class="badge badge-semfone">📵 Sem fone</span>' : ''}
        </div>
      </div>
    `;
  }).join('');
}
