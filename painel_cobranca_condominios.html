<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Cobrança - Renaissance</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    padding: 20px;
  }
  .header {
    max-width: 1200px;
    margin: 0 auto 20px;
    padding: 24px 28px;
    background: linear-gradient(135deg, #00d4aa 0%, #009977 100%);
    border-radius: 14px;
    color: #000;
  }
  .header h1 { margin: 0 0 6px; font-size: 26px; }
  .header .sub { font-size: 14px; opacity: 0.8; }
  .header .data-ref { font-size: 12px; opacity: 0.6; margin-top: 8px; }

  .stats-row {
    display: flex; gap: 12px;
    max-width: 1200px; margin: 0 auto 20px;
    flex-wrap: wrap;
  }
  .stat-card {
    flex: 1; min-width: 140px;
    background: #1a1a1a; padding: 16px 20px;
    border-radius: 10px;
    border-left: 4px solid #00d4aa;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: #00d4aa; }
  .stat-card .label { font-size: 12px; color: #aaa; margin-top: 4px; }
  .stat-card.red { border-left-color: #ff4444; }
  .stat-card.red .num { color: #ff4444; }
  .stat-card.yellow { border-left-color: #ffaa00; }
  .stat-card.yellow .num { color: #ffaa00; }
  .stat-card.gray { border-left-color: #666; }
  .stat-card.gray .num { color: #888; }

  /* Abas de blocos */
  .tabs {
    display: flex; gap: 8px;
    max-width: 1200px; margin: 0 auto 16px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid #333;
    background: transparent;
    color: #aaa;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .tab:hover { border-color: #00d4aa; color: #00d4aa; }
  .tab.active { background: #00d4aa; color: #000; border-color: #00d4aa; }
  .tab .count {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin-left: 6px;
  }
  .tab.active .count { background: rgba(0,0,0,0.15); }

  /* Config */
  .config-section {
    max-width: 1200px; margin: 0 auto 20px;
    padding: 16px 20px;
    background: #1a1a1a; border-radius: 10px;
    border: 1px solid #2a2a2a;
  }
  .config-section h3 { font-size: 14px; color: #00d4aa; margin-bottom: 12px; }
  .config-grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .config-field { flex: 1; min-width: 200px; }
  .config-field label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
  .config-field input {
    width: 100%; padding: 8px 10px;
    border-radius: 6px; border: 1px solid #333;
    background: #0a0a0a; color: #fff;
    font-size: 12px; font-family: monospace;
  }
  .config-field input:focus { outline: none; border-color: #00d4aa; }

  /* Container */
  .container { max-width: 1200px; margin: 0 auto; }

  /* Cards */
  .card {
    background: #1a1a1a;
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    border-left: 4px solid #00d4aa;
    transition: all 0.2s;
  }
  .card:hover { border-color: #33e6bb; }
  .card.pago { border-left-color: #555; opacity: 0.5; }
  .card.pago:hover { opacity: 0.7; }
  .card.sent { border-left-color: #1ba551; opacity: 0.7; }
  .card.skipped { border-left-color: #555; opacity: 0.4; }
  .card.nao-tem-whatsapp { border-left-color: #ff4444; }
  .card-header {
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .card-info h4 {
    margin: 0 0 4px;
    font-size: 15px;
    color: #fff;
  }
  .card-info .meta {
    font-size: 12px;
    color: #999;
    line-height: 1.5;
  }
  .card-info .meta b { color: #ddd; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
  }
  .tag-green { background: #1a4d2e; color: #00d4aa; }
  .tag-red { background: #4d1a1a; color: #ff4444; }
  .tag-yellow { background: #4d3d1a; color: #ffaa00; }
  .tag-gray { background: #333; color: #888; }

  .message-area {
    padding: 0 18px;
    margin-bottom: 10px;
  }
  .message-preview {
    width: 100%;
    min-height: 100px;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    background: #0a0a0a;
    color: #ddd;
    font-size: 12px;
    line-height: 1.5;
    font-family: inherit;
    resize: vertical;
    white-space: pre-wrap;
  }
  .message-preview:focus { outline: none; border-color: #00d4aa; }

  .actions {
    padding: 10px 18px 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-top: 1px solid #2a2a2a;
  }
  .btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-send { background: #00d4aa; color: #000; }
  .btn-send:hover { background: #00e6bb; }
  .btn-send:disabled { background: #1a4d3a; color: #666; cursor: not-allowed; }
  .btn-skip { background: transparent; color: #888; border: 1px solid #333; }
  .btn-skip:hover { color: #fff; border-color: #555; }
  .btn-pix { background: #0055ff; color: #fff; font-size: 11px; padding: 5px 10px; }

  .footer-actions {
    max-width: 1200px; margin: 24px auto;
    padding: 20px;
    background: #1a1a1a;
    border-radius: 10px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-big {
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 700;
  }
  .btn-big.send-all { background: #00d4aa; color: #000; }
  .btn-big.send-all:disabled { background: #1a4d3a; color: #666; cursor: not-allowed; }
  .btn-big.skip-all { background: transparent; color: #888; border: 1px solid #444; }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .approved { background: #1a4d2e; color: #00d4aa; }
  .failed { background: #4d1a1a; color: #ff4444; }
  .skipped { background: #333; color: #888; }

  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #00d4aa; color: #000;
    padding: 12px 18px; border-radius: 8px;
    font-weight: 600; font-size: 13px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    display: none; z-index: 100;
  }
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(0,0,0,0.3);
    border-radius: 50%; border-top-color: #000;
    animation: spin 1s linear infinite;
    margin-right: 4px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .bloco-content { display: none; }
  .bloco-content.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>🏢 Painel de Cobrança - Renaissance</h1>
  <div class="sub">EnvIO manual de cobrança via WhatsApp · Pratika Administradora</div>
  <div class="data-ref" id="dataRef">Carregando...</div>
</div>

<!-- Config -->
<div class="config-section">
  <h3>⚙️ Configuração Z-API</h3>
  <div class="config-grid">
    <div class="config-field">
      <label>Client-Token</label>
      <input type="text" id="clientToken" value="F45886bf7d2c54c2385c46c92e3c5c259S">
    </div>
    <div class="config-field">
      <label>Instance ID</label>
      <input type="text" id="instanceId" value="3F3504716F44324E0D095EE982B712E3">
    </div>
    <div class="config-field">
      <label>Instance Token</label>
      <input type="text" id="instanceToken" value="EB69BCFE629B94E3AAC8D8E9">
    </div>
  </div>
</div>

<!-- Stats -->
<div class="stats-row" id="statsRow"></div>

<!-- Abas -->
<div class="tabs" id="tabsContainer"></div>

<!-- Container -->
<div class="container" id="container"></div>

<!-- Footer -->
<div class="footer-actions">
  <button class="btn btn-big send-all" id="btnSendAll" onclick="enviarTodas()">📤 Enviar TODAS pendentes</button>
  <button class="btn btn-big skip-all" onclick="pularTodas()">❌ Pular TODAS</button>
  <button class="btn btn-big" style="background:#0055ff;color:#fff" onclick="copiarPixTodas()">📋 Copiar PIX de todas</button>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// DADOS REAIS DO RENAISSANCE (carregados do JSON)
// ═══════════════════════════════════════════════════════════

const DADOS = null; // Serão carregados via fetch

let boletosData = [];
let blocosData = {};
let blocosOrdem = [];

async function carregarDados() {
  try {
    // Tenta carregar via API local
    const r = await fetch('/api/boletos');
    if (r.ok) {
      const dados = await r.json();
      processarDados(dados.boletos || dados, dados.atualizado_em);
      return;
    }
  } catch(e) {}

  try {
    // Fallback: tenta o arquivo JSON direto
    const r = await fetch('agente/data/renaissance.json');
    if (r.ok) {
      const dados = await r.json();
      processarDados(dados.boletos || dados, dados.atualizado_em);
      return;
    }
  } catch(e) {}

  // Fallback final: dados embutidos
  const dados = await fetch('agente/data/renaissance.json');
  // Tenta localhost:5005
  try {
    const r = await fetch('http://localhost:5005/api/boletos', {
      headers: { 'Authorization': 'Bearer cobranca_renaissance_2026_zapi_pratika_nuvio' }
    });
    if (r.ok) {
      const d = await r.json();
      processarDados(d.boletos || d, d.atualizado_em);
      return;
    }
  } catch(e) {
    usarDadosEmbutidos();
  }
}

function processarDados(boletos, atualizadoEm) {
  boletosData = boletos;
  document.getElementById('dataRef').textContent = 'Atualizado: ' + (atualizadoEm || new Date().toLocaleString());

  // Agrupa por bloco (unidade[:2])
  blocosData = {};
  for (const b of boletos) {
    const bloco = (b.unidade || '??').substring(0, 2);
    if (!blocosData[bloco]) blocosData[bloco] = [];
    blocosData[bloco].push(b);
  }
  blocosOrdem = Object.keys(blocosData).sort();

  renderizarStats();
  renderizarAbas();
  renderizarCards(blocosOrdem[0] || '');
  document.querySelector('.tab')?.classList.add('active');
  document.querySelector('.bloco-content')?.classList.add('active');
}

function renderizarStats() {
  const total = boletosData.length;
  const comWpp = boletosData.filter(b => b.whatsapp).length;
  const semWpp = total - comWpp;
  const pendentes = boletosData.filter(b => (b.status || '').toLowerCase() !== 'pago').length;
  const vencidos = boletosData.filter(b => (b.dias_atraso || 0) > 3).length;
  const totalValor = boletosData.reduce((s, b) => s + (b.valor || 0), 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Total Unidades</div></div>
    <div class="stat-card red"><div class="num">${pendentes}</div><div class="label">Pendentes</div></div>
    <div class="stat-card yellow"><div class="num">${vencidos}</div><div class="label">Vencidos (+3d)</div></div>
    <div class="stat-card"><div class="num">${comWpp}</div><div class="label">Com WhatsApp</div></div>
    <div class="stat-card gray"><div class="num">${semWpp}</div><div class="label">Sem WhatsApp</div></div>
    <div class="stat-card"><div class="num">R$ ${(totalValor).toLocaleString('pt-BR', {minimumFractionDigits:2})}</div><div class="label">Valor Total</div></div>
  `;
}

function renderizarAbas() {
  const tabs = document.getElementById('tabsContainer');
  tabs.innerHTML = blocosOrdem.map(bloco =>
    `<button class="tab" onclick="switchBloco('${bloco}')">
      Bloco ${bloco} <span class="count">${blocosData[bloco].length}</span>
    </button>`
  ).join('');
}

function switchBloco(bloco) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.bloco-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('bloco-' + bloco)?.classList.add('active');
}

function renderizarCards(blocoAtivo) {
  const container = document.getElementById('container');
  container.innerHTML = blocosOrdem.map(bloco => `
    <div class="bloco-content${bloco === blocoAtivo ? ' active' : ''}" id="bloco-${bloco}">
      <h3 style="color:#00d4aa;margin-bottom:12px;font-size:16px;">
        🏢 Bloco ${bloco} — ${blocosData[bloco].length} unidades
        <span style="font-size:12px;color:#888;font-weight:400;">
          (${blocosData[bloco].filter(b => b.whatsapp).length} com WhatsApp)
        </span>
      </h3>
      ${blocosData[bloco].sort((a,b) => a.unidade.localeCompare(b.unidade)).map(b => renderCard(b)).join('')}
    </div>
  `).join('');
}

function renderCard(b) {
  const id = b.boleto_id || b.id || Math.random().toString(36).substr(2,6);
  const status = (b.status || '').toLowerCase();
  const dias = b.dias_atraso || 0;
  const temWpp = !!b.whatsapp;
  const phone = (b.whatsapp || '').replace(/\D/g, '');
  const valor = b.valor || 0;
  const venc = b.vencimento || '—';

  let statusTag = '';
  let cardClass = '';
  if (status === 'pago') {
    statusTag = '<span class="tag tag-gray">PAGO</span>';
    cardClass = 'pago';
  } else if (dias >= 30) {
    statusTag = '<span class="tag tag-red">' + dias + 'd atraso</span>';
  } else if (dias >= 7) {
    statusTag = '<span class="tag tag-yellow">' + dias + 'd atraso</span>';
  } else if (dias > 0) {
    statusTag = '<span class="tag tag-green">' + dias + 'd atraso</span>';
  } else {
    statusTag = '<span class="tag tag-green">A vencer</span>';
  }

  if (!temWpp) {
    cardClass = 'nao-tem-whatsapp';
    statusTag += ' <span class="tag tag-red">Sem WhatsApp</span>';
  }

  // Mensagem personalizada por status
  let msg = '';
  if (status === 'pago') {
    msg = `Prezado(a) ${b.nome}, tudo bem? Aqui é da Pratika, do condomínio Renaissance. Já identificamos o pagamento do boleto do apto ${b.unidade}. Muito obrigado! 🎉`;
  } else if (dias >= 15) {
    msg = `Prezado(a) ${b.nome}, o boleto do Renaissance (${b.unidade}) está com ${dias} dias de atraso, valor original R$ ${valor.toFixed(2).replace('.',',')}. Já estão incidindo juros e multa. Precisamos regularizar essa situação. Me responda para negociarmos.`;
  } else if (dias >= 5) {
    msg = `Prezado(a) ${b.nome}, identificamos que o boleto do Renaissance (${b.unidade}) vencido em ${venc} ainda consta em aberto. Valor: R$ ${valor.toFixed(2).replace('.',',')}. Regularize para evitar juros. Me avise se precisar de ajuda.`;
  } else if (dias > 0) {
    msg = `Prezado(a) ${b.nome}, o boleto do Renaissance (${b.unidade}) venceu em ${venc}. Valor: R$ ${valor.toFixed(2).replace('.',',')}. Se já pagou, desconsidere. Caso contrário, regularize para evitar encargos.`;
  } else {
    msg = `Prezado(a) ${b.nome}, o boleto do Renaissance (${b.unidade}) vence em ${venc}. Valor: R$ ${valor.toFixed(2).replace('.',',')}. Evite juros — quite até o vencimento.`;
  }

  return `
    <div class="card ${cardClass}" data-id="${id}" data-phone="${phone}" data-wpp="${temWpp}">
      <div class="card-header">
        <div class="card-info">
          <h4>${b.nome} ${statusTag}</h4>
          <div class="meta">
            <b>Apto:</b> ${b.unidade} &nbsp;|&nbsp; <b>Valor:</b> R$ ${valor.toFixed(2).replace('.',',')}
            &nbsp;|&nbsp; <b>Venc:</b> ${venc}
            ${phone ? '&nbsp;|&nbsp; <b>WhatsApp:</b> ' + phone : ''}
          </div>
        </div>
      </div>
      <div class="message-area">
        <textarea class="message-preview" id="msg-${id}">${msg}</textarea>
      </div>
      <div class="actions" id="actions-${id}">
        ${temWpp ? `
          <button class="btn btn-send" id="send-${id}" onclick="enviar('${id}')">📤 Enviar WhatsApp</button>
          <button class="btn btn-pix" onclick="copiarPix('${b.nome}')">📋 Pix</button>
        ` : `
          <span style="color:#ff4444;font-size:12px;">⚠️ Sem número de WhatsApp cadastrado</span>
        `}
        <button class="btn btn-skip" onclick="pular('${id}')">❌ Pular</button>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// FUNÇÕES DE ENVIO
// ═══════════════════════════════════════════════════════════

function getBaseUrl() {
  const iid = document.getElementById('instanceId').value.trim();
  const itok = document.getElementById('instanceToken').value.trim();
  return 'https://api.z-api.io/instances/' + iid + '/token/' + itok;
}
function getClientToken() { return document.getElementById('clientToken').value.trim(); }
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#ff4444' : '#00d4aa';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 4000);
}

async function enviar(id) {
  const card = document.querySelector('.card[data-id="' + id + '"]');
  const phone = card.getAttribute('data-phone');
  const textarea = document.getElementById('msg-' + id);
  const message = textarea.value.trim();
  const btn = document.getElementById('send-' + id);

  if (!message) { toast('Mensagem vazia!', 'error'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Enviando...';

  try {
    const r = await fetch(getBaseUrl() + '/send-text', {
      method: 'POST',
      headers: { 'Client-Token': getClientToken(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone, message: message, delayMessage: 1 })
    });
    const data = await r.json();
    if (r.ok && (data.messageId || data.zaapId)) {
      const actions = document.getElementById('actions-' + id);
      actions.innerHTML = '<span class="status-badge approved">✅ Enviado</span>';
      card.classList.add('sent');
      toast('Enviado para ' + phone);
    } else {
      throw new Error(data.error || 'Erro');
    }
  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = '📤 Tentar novamente';
    toast('Erro: ' + err.message, 'error');
  }
}

function pular(id) {
  const actions = document.getElementById('actions-' + id);
  actions.innerHTML = '<span class="status-badge skipped">❌ Pulado</span>';
  toast('Pulado');
}

async function enviarTodas() {
  if (!confirm('Enviar para TODAS as unidades pendentes?')) return;
  const btn = document.getElementById('btnSendAll');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Enviando...';

  const cards = document.querySelectorAll('.card:not(.pago):not(.sent):not(.skipped)');
  let count = 0;
  for (const card of cards) {
    if (card.getAttribute('data-wpp') !== 'true') continue;
    const id = card.getAttribute('data-id');
    await enviar(id);
    count++;
    if (count < cards.length) await new Promise(r => setTimeout(r, 3000));
  }
  btn.disabled = false;
  btn.innerHTML = '📤 Enviar TODAS pendentes';
  toast('Envio em lote concluído! ' + count + ' mensagens');
}

function pularTodas() {
  if (!confirm('Pular TODAS as mensagens?')) return;
  document.querySelectorAll('.card:not(.pago):not(.sent):not(.skipped)').forEach(c => {
    pular(c.getAttribute('data-id'));
  });
}

function copiarPix(nome) {
  const pix = 'renaissance.cobranca@admpratika.com.br';
  navigator.clipboard.writeText(pix);
  toast('PIX copiado: ' + pix);
}

function copiarPixTodas() {
  const pix = 'renaissance.cobranca@admpratika.com.br';
  navigator.clipboard.writeText(pix);
  toast('PIX geral copiado: ' + pix);
}

// ═══════════════════════════════════════════════════════════
// INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════════

carregarDados();
</script>

</body>
</html>
